name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyautogui pillow pyscreeze pymsgbox pytweening mouseinfo pygetwindow pyrect pyperclip opencv-python

      - name: Create icon
        shell: pwsh
        run: |
          if (-not (Test-Path "logo.ico")) {
            python -c "from PIL import Image; Image.open('logo.png').save('logo.ico')"
          }

      - name: Build
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onefile `
            --name AutoClickLoop `
            --add-data "logo.png;." `
            --add-data "logo-app.png;." `
            --icon logo.ico `
            app.py

      - name: Sign EXE with Trusted Signing
        if: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_SECRET != '' && secrets.TRUSTED_SIGNING_ACCOUNT_NAME != '' && secrets.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME != '' && secrets.TRUSTED_SIGNING_ENDPOINT != '' }}
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: ${{ github.workspace }}\dist\AutoClickLoop.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoClickLoop-Windows
          path: dist/AutoClickLoop.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AutoClickLoop.exe
