name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyautogui pillow pyscreeze pymsgbox pytweening mouseinfo pygetwindow pyrect pyperclip opencv-python

      - name: Create icon
        shell: pwsh
        run: |
          if (-not (Test-Path "logo.ico")) {
            python -c "from PIL import Image; Image.open('logo.png').save('logo.ico')"
          }

      - name: Build
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --name AutoClickLoop `
            --add-data "logo.png;." `
            --add-data "logo-app.png;." `
            --icon logo.ico `
            app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoClickLoop-Windows
          path: dist/AutoClickLoop
